name: AI PM Platform CI/CD

on:
  push:
    branches: [ "develop", "main" ]
  pull_request:
    branches: [ "develop", "main" ]

jobs:
  security-and-testing:
    runs-on: ubuntu-latest
    
    steps:
      # 1. سحب الكود من المستودع
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. الفحص الأمني باستخدام GitLeaks
      - name: GitLeaks Security Scan
        run: |
          wget -qO- https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz | tar -xz
          ./gitleaks detect --source . -v

      # 3. إعداد بيئة بايثون
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 4. تثبيت مكتبات المشروع الأساسية وأدوات الاختبار
      # أضفنا مكتبة httpx لأن TestClient يحتاجها لاختبارات التكامل
      - name: Install Dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest httpx

      # 5. تشغيل كافة الاختبارات (الوحدة والتكامل)
      - name: Run All Backend Tests (Unit & Integration)
        working-directory: ./backend
        run: |
          python -m pytest tests/ -v